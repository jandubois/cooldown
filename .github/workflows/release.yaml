name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/cooldown-linux-amd64 ./cmd/cooldown/
          GOOS=linux GOARCH=arm64 go build -o dist/cooldown-linux-arm64 ./cmd/cooldown/

      - name: Create semver release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Update floating major-version tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          major="${tag%%.*}"

          # Move the floating tag to this commit
          git tag --force "$major"
          git push --force origin "$major"

          # Replace the major-version release so that
          # releases/download/v1/cooldown-* URLs resolve
          gh release delete "$major" --yes 2>/dev/null || true
          gh release create "$major" dist/* \
            --title "$major" \
            --notes "Latest ${major}.x release. See [$tag](https://github.com/${{ github.repository }}/releases/tag/$tag) for details." \
            --latest=false
