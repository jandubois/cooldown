# Example: add this workflow to repos that use Dependabot with cooldown.
#
# Requires the consuming repo's go.mod to declare:
#   tool github.com/jandubois/cooldown/cmd/cooldown
#
# For non-Go repos, use the action directly instead:
#   uses: jandubois/cooldown@v1
#   with:
#     dependencies-json: ${{ steps.metadata.outputs.updated-dependencies-json }}
#     github-token: ${{ secrets.GITHUB_TOKEN }}

name: Dependabot Cooldown Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  cooldown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        uses: actions/checkout@v4

      - name: Set up Go
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Fetch Dependabot metadata
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check versions are latest
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        env:
          DEPENDENCIES_JSON: ${{ steps.metadata.outputs.updated-dependencies-json }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go tool cooldown check
